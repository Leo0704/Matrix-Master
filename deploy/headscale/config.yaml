# Headscale 开发配置
# 详细文档：https://headscale.net/

server_url: http://localhost:8080
listen_addr: 0.0.0.0:8080
metrics_listen_addr: 0.0.0.0:9090

# 生产环境必须生成正式密钥
# 这里用 dev 占位
private_key: "dev-private-key-replace-in-production"
noise:
  private_key: "dev-noise-key-replace-in-production"

database:
  type: sqlite
  sqlite:
    path: /var/lib/headscale/db.sqlite

dns:
  magic_dns: true
  base_domain: matrix.local
  nameservers.global:
    - 1.1.1.1
    - 8.8.8.8

# 开发环境：所有 tailnet 节点互通
# 生产环境：收紧 ACL
acl_policy_path: ""

# 关闭自动更新 DERP（避免覆盖本地配置）
derp:
  urls: []
  auto_update_enabled: false

# 日志
log:
  level: debug
